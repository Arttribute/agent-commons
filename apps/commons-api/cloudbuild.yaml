steps:
  - name: 'node:22'
    entrypoint: 'bash'
    env:
      - 'PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true'
      - 'PUPPETEER_SKIP_DOWNLOAD=true'
    args:
      - '-c'
      - |
        npm install -g pnpm
        pnpm install
        pnpm --filter commons-api build
        # Deploy prod deps from lockfile into a standalone directory
        pnpm --filter commons-api deploy --prod --ignore-scripts apps/commons-api/.deploy
        # Copy compiled dist into the deploy package
        cp -r apps/commons-api/dist apps/commons-api/.deploy/dist

  - name: 'gcr.io/cloud-builders/docker'
    dir: './apps/commons-api'
    args:
      [
        'build',
        '--cache-from',
        'europe-west1-docker.pkg.dev/$PROJECT_ID/commons/commons-api:prod',
        '-t',
        'europe-west1-docker.pkg.dev/$PROJECT_ID/commons/commons-api:$SHORT_SHA',
        '-f',
        'Dockerfile',
        '.',
      ]

  - name: 'gcr.io/cloud-builders/docker'
    dir: '.'
    args:
      [
        'tag',
        'europe-west1-docker.pkg.dev/$PROJECT_ID/commons/commons-api:$SHORT_SHA',
        'europe-west1-docker.pkg.dev/$PROJECT_ID/commons/commons-api:prod',
      ]

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'europe-west1-docker.pkg.dev/$PROJECT_ID/commons/commons-api',
        '--all-tags',
      ]

  - id: deploy
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: gcloud
    allowFailure: true
    args:
      - run
      - deploy
      - arttribute-commons-api-prod
      - --region=europe-west1
      - --platform=managed
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/commons/commons-api:prod
      - --memory=2Gi
      - --cpu=2
      - --cpu-boost
      - --timeout=300
      - --concurrency=80
    timeout: 1800s

  # Always print recent Cloud Run logs to surface startup errors
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    waitFor: ['deploy']
    args:
      - '-c'
      - |
        echo "=== Cloud Run logs for arttribute-commons-api-prod ===" && \
        gcloud logging read \
          'resource.type=cloud_run_revision AND resource.labels.service_name=arttribute-commons-api-prod' \
          --project=$PROJECT_ID \
          --limit=80 \
          --format='value(textPayload,jsonPayload.message)' \
          --freshness=5m 2>/dev/null || true
    timeout: 60s

  # Fail the build if the deploy step failed
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    waitFor: ['deploy']
    args:
      - '-c'
      - |
        gcloud run services describe arttribute-commons-api-prod \
          --region=europe-west1 \
          --format='value(status.conditions[0].status)' | grep -q True && \
          echo "Deploy succeeded" || \
          (echo "Deploy failed — see logs above" && exit 1)
    timeout: 60s
