services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: commons
      POSTGRES_PASSWORD: commons
      POSTGRES_DB: commons_identity
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commons -d commons_identity"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - commons_identity_postgres:/var/lib/postgresql/data

volumes:
  commons_identity_postgres:
