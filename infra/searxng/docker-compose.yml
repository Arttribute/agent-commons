services:
  searxng:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      SEARXNG_BASE_URL: http://localhost:8888/
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-this-local-secret}
      SEARXNG_API_KEY: ${SEARXNG_API_KEY:-local-search-key}
