AWSTemplateFormatVersion: "2010-09-09"
Description: Agent Commons API ECS Express Mode service.

Parameters:
  ImageUri:
    Type: String
  ExecutionRoleArn:
    Type: String
  InfrastructureRoleArn:
    Type: String
  RuntimeSecretArn:
    Type: String

Resources:
  ApiService:
    Type: AWS::ECS::ExpressGatewayService
    Properties:
      ServiceName: agent-commons-api-production
      Cluster: default
      ExecutionRoleArn: !Ref ExecutionRoleArn
      InfrastructureRoleArn: !Ref InfrastructureRoleArn
      Cpu: "1024"
      Memory: "2048"
      HealthCheckPath: /health
      PrimaryContainer:
        Image: !Ref ImageUri
        ContainerPort: 8080
        Environment:
          - Name: NODE_ENV
            Value: production
          - Name: HOST
            Value: 0.0.0.0
          - Name: LOG_LEVEL
            Value: info
          - Name: PORT
            Value: "8080"
        Secrets:
          - Name: APP_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:APP_KEY::"
          - Name: PINATA_JWT
            ValueFrom: !Sub "${RuntimeSecretArn}:PINATA_JWT::"
          - Name: GATEWAY_URL
            ValueFrom: !Sub "${RuntimeSecretArn}:GATEWAY_URL::"
          - Name: POSTGRES_DATABASE
            ValueFrom: !Sub "${RuntimeSecretArn}:POSTGRES_DATABASE::"
          - Name: POSTGRES_USER
            ValueFrom: !Sub "${RuntimeSecretArn}:POSTGRES_USER::"
          - Name: POSTGRES_PORT
            ValueFrom: !Sub "${RuntimeSecretArn}:POSTGRES_PORT::"
          - Name: POSTGRES_HOST
            ValueFrom: !Sub "${RuntimeSecretArn}:POSTGRES_HOST::"
          - Name: POSTGRES_PASSWORD
            ValueFrom: !Sub "${RuntimeSecretArn}:POSTGRES_PASSWORD::"
          - Name: WALLET_PRIVATE_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:WALLET_PRIVATE_KEY::"
          - Name: OPENAI_API_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:OPENAI_API_KEY::"
          - Name: GRAPH_API_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:GRAPH_API_KEY::"
          - Name: SUPABASE_URL
            ValueFrom: !Sub "${RuntimeSecretArn}:SUPABASE_URL::"
          - Name: SUPABASE_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:SUPABASE_KEY::"
          - Name: AGENT_FILES_S3_BUCKET
            ValueFrom: !Sub "${RuntimeSecretArn}:AGENT_FILES_S3_BUCKET::"
          - Name: AGENT_FILES_S3_REGION
            ValueFrom: !Sub "${RuntimeSecretArn}:AGENT_FILES_S3_REGION::"
          - Name: AGENT_FILES_S3_PREFIX
            ValueFrom: !Sub "${RuntimeSecretArn}:AGENT_FILES_S3_PREFIX::"
          - Name: AGENT_FILES_AWS_ROLE_ARN
            ValueFrom: !Sub "${RuntimeSecretArn}:AGENT_FILES_AWS_ROLE_ARN::"
          - Name: AGENT_FILES_S3_ENDPOINT
            ValueFrom: !Sub "${RuntimeSecretArn}:AGENT_FILES_S3_ENDPOINT::"
          - Name: AGENT_FILES_S3_FORCE_PATH_STYLE
            ValueFrom: !Sub "${RuntimeSecretArn}:AGENT_FILES_S3_FORCE_PATH_STYLE::"
          - Name: COINBASE_API_KEY_NAME
            ValueFrom: !Sub "${RuntimeSecretArn}:COINBASE_API_KEY_NAME::"
          - Name: COINBASE_API_KEY_SECRET
            ValueFrom: !Sub "${RuntimeSecretArn}:COINBASE_API_KEY_SECRET::"
          - Name: TOOL_KEY_ENCRYPTION_MASTER
            ValueFrom: !Sub "${RuntimeSecretArn}:TOOL_KEY_ENCRYPTION_MASTER::"
          - Name: ELEVENLABS_API_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:ELEVENLABS_API_KEY::"
          - Name: POSTHOG_PUBLIC_API_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:POSTHOG_PUBLIC_API_KEY::"
          - Name: API_SECRET_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:API_SECRET_KEY::"
          - Name: COMMONS_IDENTITY_ISSUER
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMONS_IDENTITY_ISSUER::"
          - Name: COMMONS_IDENTITY_JWKS_URL
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMONS_IDENTITY_JWKS_URL::"
          - Name: COMMONS_IDENTITY_AUDIENCE
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMONS_IDENTITY_AUDIENCE::"
          - Name: COMMONS_GATEWAY_INTERNAL_SECRET
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMONS_GATEWAY_INTERNAL_SECRET::"
          - Name: API_AUTH_REQUIRED
            ValueFrom: !Sub "${RuntimeSecretArn}:API_AUTH_REQUIRED::"
          - Name: OWNER_AUTH_REQUIRED
            ValueFrom: !Sub "${RuntimeSecretArn}:OWNER_AUTH_REQUIRED::"
          - Name: COMMON_OS_API_URL
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMON_OS_API_URL::"
          - Name: COMMON_OS_API_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMON_OS_API_KEY::"
          - Name: COMMON_OS_FLEET_ID
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMON_OS_FLEET_ID::"
          - Name: COMMON_OS_COMPUTER_API
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMON_OS_COMPUTER_API::"
          - Name: COMMON_OS_API_BASE_PATH
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMON_OS_API_BASE_PATH::"
      ScalingTarget:
        MinTaskCount: 1
        MaxTaskCount: 4
        AutoScalingMetric: AVERAGE_CPU
        AutoScalingTargetValue: 70
      Tags:
        - Key: Organization
          Value: agent-commons
        - Key: Project
          Value: agent-commons
        - Key: Environment
          Value: production

Outputs:
  Endpoint:
    Value: !GetAtt ApiService.Endpoint
  ServiceArn:
    Value: !GetAtt ApiService.ServiceArn
