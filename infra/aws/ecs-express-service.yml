AWSTemplateFormatVersion: "2010-09-09"
Description: Agent Commons API ECS Express Mode service.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
    Description: Deployment environment; drives resource names and tags.
  MaxTasks:
    Type: Number
    Default: 4
    Description: Max task count for autoscaling (staging typically 1).
  ImageUri:
    Type: String
  ExecutionRoleArn:
    Type: String
  TaskRoleArn:
    Type: String
  InfrastructureRoleArn:
    Type: String
  RuntimeSecretArn:
    Type: String
  AgentFilesS3Bucket:
    Type: String
  AgentFilesS3Region:
    Type: String
  AgentFilesS3Prefix:
    Type: String
    Default: agent-commons-files
  AgentCommonsApiUrl:
    Type: String
    Default: https://api.agentcommons.io
    Description: Public API origin used by shared managed runtimes to call back to this environment.
  XOAuthEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Inject the X OAuth app credentials after both keys exist in the runtime secret.
  CreditUnitsPerUsd:
    Type: String
    Default: "1000"
  ModelCostMarkup:
    Type: String
    Default: "2"
  AgentRunReservationCredits:
    Type: String
    Default: "1"
  AgentRunMinimumCredits:
    Type: String
    Default: "1"
  CreditGiftMin:
    Type: String
    Default: "10"
  CreditGiftDailyLimit:
    Type: String
    Default: "5000"
  DistributedRateLimitEnabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
  BraveSearchCostUsdPerCall:
    Type: String
    Default: "0.005"
  OpenAiTranscriptionCostUsdPerMinute:
    Type: String
    Default: "0.003"
  OpenAiTtsCostUsdPer1kCharacters:
    Type: String
    Default: "0.015"
  ElevenLabsTtsCostUsdPer1kCharacters:
    Type: String
    Default: "0.10"

Conditions:
  IsProduction: !Equals [!Ref Environment, production]
  IsXOAuthEnabled: !Equals [!Ref XOAuthEnabled, "true"]

Resources:
  ApiService:
    Type: AWS::ECS::ExpressGatewayService
    Properties:
      ServiceName: !Sub agent-commons-api-${Environment}
      Cluster: default
      ExecutionRoleArn: !Ref ExecutionRoleArn
      TaskRoleArn: !Ref TaskRoleArn
      InfrastructureRoleArn: !Ref InfrastructureRoleArn
      Cpu: "1024"
      Memory: "2048"
      HealthCheckPath: /health
      PrimaryContainer:
        Image: !Ref ImageUri
        ContainerPort: 8080
        Environment:
          - Name: NODE_ENV
            Value: production
          - Name: APP_ENV
            Value: !Ref Environment
          - Name: HOST
            Value: 0.0.0.0
          - Name: LOG_LEVEL
            Value: info
          - Name: PORT
            Value: "8080"
          - Name: AGENT_FILES_S3_BUCKET
            Value: !Ref AgentFilesS3Bucket
          - Name: AGENT_FILES_S3_REGION
            Value: !Ref AgentFilesS3Region
          - Name: AGENT_FILES_S3_PREFIX
            Value: !Ref AgentFilesS3Prefix
          - Name: AGENT_COMMONS_API_URL
            Value: !Ref AgentCommonsApiUrl
          # Pricing and rate-limit controls are operational configuration, not
          # secrets. Keeping them as ordinary task environment values lets a
          # deployment use safe defaults even when an older runtime secret has
          # not yet been backfilled with newly introduced JSON keys.
          - Name: CREDIT_UNITS_PER_USD
            Value: !Ref CreditUnitsPerUsd
          - Name: MODEL_COST_MARKUP
            Value: !Ref ModelCostMarkup
          - Name: AGENT_RUN_RESERVATION_CREDITS
            Value: !Ref AgentRunReservationCredits
          - Name: AGENT_RUN_MINIMUM_CREDITS
            Value: !Ref AgentRunMinimumCredits
          - Name: CREDIT_GIFT_MIN
            Value: !Ref CreditGiftMin
          - Name: CREDIT_GIFT_DAILY_LIMIT
            Value: !Ref CreditGiftDailyLimit
          - Name: DISTRIBUTED_RATE_LIMIT_ENABLED
            Value: !Ref DistributedRateLimitEnabled
          - Name: BRAVE_SEARCH_COST_USD_PER_CALL
            Value: !Ref BraveSearchCostUsdPerCall
          - Name: OPENAI_TRANSCRIPTION_COST_USD_PER_MINUTE
            Value: !Ref OpenAiTranscriptionCostUsdPerMinute
          - Name: OPENAI_TTS_COST_USD_PER_1K_CHARACTERS
            Value: !Ref OpenAiTtsCostUsdPer1kCharacters
          - Name: ELEVENLABS_TTS_COST_USD_PER_1K_CHARACTERS
            Value: !Ref ElevenLabsTtsCostUsdPer1kCharacters
          - Name: PROTOTYPE_PUBLIC_BASE_URL
            Value: !If
              - IsProduction
              - https://api.agentcommons.io/v1/previews
              - https://api-staging.agentcommons.io/v1/previews
        Secrets:
          - Name: APP_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:APP_KEY::"
          - Name: PINATA_JWT
            ValueFrom: !Sub "${RuntimeSecretArn}:PINATA_JWT::"
          - Name: GATEWAY_URL
            ValueFrom: !Sub "${RuntimeSecretArn}:GATEWAY_URL::"
          - Name: POSTGRES_DATABASE
            ValueFrom: !Sub "${RuntimeSecretArn}:POSTGRES_DATABASE::"
          - Name: POSTGRES_USER
            ValueFrom: !Sub "${RuntimeSecretArn}:POSTGRES_USER::"
          - Name: POSTGRES_PORT
            ValueFrom: !Sub "${RuntimeSecretArn}:POSTGRES_PORT::"
          - Name: POSTGRES_HOST
            ValueFrom: !Sub "${RuntimeSecretArn}:POSTGRES_HOST::"
          - Name: POSTGRES_PASSWORD
            ValueFrom: !Sub "${RuntimeSecretArn}:POSTGRES_PASSWORD::"
          - Name: WALLET_PRIVATE_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:WALLET_PRIVATE_KEY::"
          - Name: OPENAI_API_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:OPENAI_API_KEY::"
          - Name: GRAPH_API_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:GRAPH_API_KEY::"
          - Name: SUPABASE_URL
            ValueFrom: !Sub "${RuntimeSecretArn}:SUPABASE_URL::"
          - Name: SUPABASE_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:SUPABASE_KEY::"
          - Name: COINBASE_API_KEY_NAME
            ValueFrom: !Sub "${RuntimeSecretArn}:COINBASE_API_KEY_NAME::"
          - Name: COINBASE_API_KEY_SECRET
            ValueFrom: !Sub "${RuntimeSecretArn}:COINBASE_API_KEY_SECRET::"
          - Name: TOOL_KEY_ENCRYPTION_MASTER
            ValueFrom: !Sub "${RuntimeSecretArn}:TOOL_KEY_ENCRYPTION_MASTER::"
          - Name: ELEVENLABS_API_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:ELEVENLABS_API_KEY::"
          - Name: POSTHOG_PUBLIC_API_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:POSTHOG_PUBLIC_API_KEY::"
          - Name: API_SECRET_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:API_SECRET_KEY::"
          - Name: COMMONS_IDENTITY_ISSUER
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMONS_IDENTITY_ISSUER::"
          - Name: COMMONS_IDENTITY_JWKS_URL
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMONS_IDENTITY_JWKS_URL::"
          - Name: COMMONS_IDENTITY_AUDIENCE
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMONS_IDENTITY_AUDIENCE::"
          - Name: COMMONS_GATEWAY_INTERNAL_SECRET
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMONS_GATEWAY_INTERNAL_SECRET::"
          - Name: API_AUTH_REQUIRED
            ValueFrom: !Sub "${RuntimeSecretArn}:API_AUTH_REQUIRED::"
          - Name: OWNER_AUTH_REQUIRED
            ValueFrom: !Sub "${RuntimeSecretArn}:OWNER_AUTH_REQUIRED::"
          - Name: COMMON_OS_API_URL
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMON_OS_API_URL::"
          - Name: COMMON_OS_API_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMON_OS_API_KEY::"
          - Name: COMMON_OS_FLEET_ID
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMON_OS_FLEET_ID::"
          - Name: COMMON_OS_COMPUTER_API
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMON_OS_COMPUTER_API::"
          - Name: COMMON_OS_API_BASE_PATH
            ValueFrom: !Sub "${RuntimeSecretArn}:COMMON_OS_API_BASE_PATH::"
          - Name: CORS_ORIGIN
            ValueFrom: !Sub "${RuntimeSecretArn}:CORS_ORIGIN::"
          - Name: POSTGRES_SSL
            ValueFrom: !Sub "${RuntimeSecretArn}:POSTGRES_SSL::"
          - Name: SSRF_ALLOW_HOSTS
            ValueFrom: !Sub "${RuntimeSecretArn}:SSRF_ALLOW_HOSTS::"
          - Name: SPACE_RTC_TICKET_SECRET
            ValueFrom: !Sub "${RuntimeSecretArn}:SPACE_RTC_TICKET_SECRET::"
          - Name: MANAGEMENT_KEY_ENABLED
            ValueFrom: !Sub "${RuntimeSecretArn}:MANAGEMENT_KEY_ENABLED::"
          - !If
            - IsXOAuthEnabled
            - Name: X_OAUTH_CLIENT_ID
              ValueFrom: !Sub "${RuntimeSecretArn}:X_OAUTH_CLIENT_ID::"
            - !Ref AWS::NoValue
          - !If
            - IsXOAuthEnabled
            - Name: X_OAUTH_CLIENT_SECRET
              ValueFrom: !Sub "${RuntimeSecretArn}:X_OAUTH_CLIENT_SECRET::"
            - !Ref AWS::NoValue
          - Name: STRIPE_SECRET_KEY
            ValueFrom: !Sub "${RuntimeSecretArn}:STRIPE_SECRET_KEY::"
          - Name: STRIPE_WEBHOOK_SECRET
            ValueFrom: !Sub "${RuntimeSecretArn}:STRIPE_WEBHOOK_SECRET::"
          - Name: STRIPE_PRICE_PLUS
            ValueFrom: !Sub "${RuntimeSecretArn}:STRIPE_PRICE_PLUS::"
          - Name: STRIPE_PRICE_PRO
            ValueFrom: !Sub "${RuntimeSecretArn}:STRIPE_PRICE_PRO::"
          - Name: STRIPE_PRICE_MAX
            ValueFrom: !Sub "${RuntimeSecretArn}:STRIPE_PRICE_MAX::"
          - Name: STRIPE_PRICE_TOPUP_SMALL
            ValueFrom: !Sub "${RuntimeSecretArn}:STRIPE_PRICE_TOPUP_SMALL::"
          - Name: STRIPE_PRICE_TOPUP_MEDIUM
            ValueFrom: !Sub "${RuntimeSecretArn}:STRIPE_PRICE_TOPUP_MEDIUM::"
          - Name: STRIPE_PRICE_TOPUP_LARGE
            ValueFrom: !Sub "${RuntimeSecretArn}:STRIPE_PRICE_TOPUP_LARGE::"
          - Name: CREDIT_DEBITS_ENABLED
            ValueFrom: !Sub "${RuntimeSecretArn}:CREDIT_DEBITS_ENABLED::"
          - Name: BILLING_ENFORCEMENT
            ValueFrom: !Sub "${RuntimeSecretArn}:BILLING_ENFORCEMENT::"
          - Name: COMPUTE_METERING_ENABLED
            ValueFrom: !Sub "${RuntimeSecretArn}:COMPUTE_METERING_ENABLED::"
          - Name: BILLING_SWEEPER_ENABLED
            ValueFrom: !Sub "${RuntimeSecretArn}:BILLING_SWEEPER_ENABLED::"
      ScalingTarget:
        MinTaskCount: 1
        MaxTaskCount: !Ref MaxTasks
        AutoScalingMetric: AVERAGE_CPU
        AutoScalingTargetValue: 70
      Tags:
        - Key: Organization
          Value: agent-commons
        - Key: Project
          Value: agent-commons
        - Key: Environment
          Value: !Ref Environment

Outputs:
  Endpoint:
    Value: !GetAtt ApiService.Endpoint
  ServiceArn:
    Value: !GetAtt ApiService.ServiceArn
