AWSTemplateFormatVersion: "2010-09-09"
Description: Bootstrap resources for deploying commons-api to Amazon ECS Express Mode.

# Deploy once per environment. Account-global resources (ECR repo, source
# bucket, OIDC provider) are created only by the production stack; the staging
# stack references them by name/ARN so both environments share images and CI
# source while keeping their own secret, IAM roles, files bucket, and CodeBuild
# project. Production physical names are unchanged for continuity.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
  GitHubOrganization:
    Type: String
    Default: Arttribute
  GitHubRepository:
    Type: String
    Default: agent-commons
  GitHubEnvironment:
    Type: String
    Default: production
  ExistingGitHubOidcProviderArn:
    Type: String
    Default: ""
    Description: Leave empty to create the GitHub Actions OIDC provider in this account (production only).
  SharedEcrRepositoryName:
    Type: String
    Default: agent-commons/commons-api
    Description: ECR repo name (shared across envs; created by the production stack).
  SharedSourceBucketName:
    Type: String
    Default: ""
    Description: For staging, the CI source bucket name created by the production stack. Ignored for production.

Conditions:
  IsProduction: !Equals [!Ref Environment, production]
  CreateGitHubOidcProvider: !And
    - !Equals [!Ref ExistingGitHubOidcProviderArn, ""]
    - !Condition IsProduction

Resources:
  # ── Shared account-global resources (production stack only) ──────────────
  ApiRepository:
    Type: AWS::ECR::Repository
    Condition: IsProduction
    Properties:
      RepositoryName: agent-commons/commons-api
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep the latest 30 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 30
              },
              "action": {"type": "expire"}
            }]
          }

  SourceBucket:
    Type: AWS::S3::Bucket
    Condition: IsProduction
    Properties:
      BucketName: !Sub agent-commons-cicd-${AWS::AccountId}-${AWS::Region}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateGitHubOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  # ── Per-environment resources ────────────────────────────────────────────
  ApiRuntimeSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub agent-commons/commons-api/${Environment}
      Description: !Sub Runtime environment variables for the ${Environment} commons-api service.
      SecretString: "{}"

  AgentFilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - IsProduction
        - !Sub agent-commons-files-${AWS::AccountId}-${AWS::Region}
        - !Sub agent-commons-files-${Environment}-${AWS::AccountId}-${AWS::Region}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !If [IsProduction, agent-commons-api-task-execution, !Sub "agent-commons-api-${Environment}-task-execution"]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadCommonsApiRuntimeSecret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref ApiRuntimeSecret

  ApiTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !If [IsProduction, agent-commons-api-task, !Sub "agent-commons-api-${Environment}-task"]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AgentFilesS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt AgentFilesBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub ${AgentFilesBucket.Arn}/*

  InfrastructureRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !If [IsProduction, agent-commons-api-ecs-infrastructure, !Sub "agent-commons-api-${Environment}-ecs-infra"]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSInfrastructureRoleforExpressGatewayServices

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !If [IsProduction, agent-commons-api-github-deploy, !Sub "agent-commons-api-${Environment}-github-deploy"]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateGitHubOidcProvider
                - !Ref GitHubOidcProvider
                - !If
                  - IsProduction
                  - !Ref ExistingGitHubOidcProviderArn
                  - !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrganization}/${GitHubRepository}:environment:${GitHubEnvironment}
      Policies:
        - PolicyName: DeployCommonsApi
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !Sub
                    - arn:aws:s3:::${Bucket}/agent-commons/*
                    - Bucket: !If [IsProduction, !Ref SourceBucket, !Ref SharedSourceBucketName]
                  - !Sub
                    - arn:aws:s3:::${Bucket}/commons-platform/*
                    - Bucket: !If [IsProduction, !Ref SourceBucket, !Ref SharedSourceBucketName]
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource:
                  - !GetAtt ApiBuildProject.Arn
                  # Also allow triggering the platform (identity+gateway) build,
                  # which shares this deploy role.
                  - !If
                    - IsProduction
                    - !Sub arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/commons-platform-production
                    - !Sub arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/commons-platform-${Environment}

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !If [IsProduction, agent-commons-api-codebuild, !Sub "agent-commons-api-${Environment}-codebuild"]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BuildAndDeployAgentCommonsApi
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - ecr:GetAuthorizationToken
                  - cloudformation:DescribeStacks
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:SetAlarmState
                  - ecs:CreateCluster
                  - ecs:RegisterTaskDefinition
                  - ecs:CreateExpressGatewayService
                  - ecs:UpdateExpressGatewayService
                  - ecs:DeleteExpressGatewayService
                  - ecs:DescribeExpressGatewayService
                  - ecs:DescribeClusters
                  - ecs:DescribeServices
                  - ecs:DescribeServiceRevisions
                  - ecs:ListServiceDeployments
                  - ecs:DescribeServiceDeployments
                  - ecs:TagResource
                  - ecs:UntagResource
                Resource: "*"
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref ApiRuntimeSecret
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub
                  - arn:aws:s3:::${Bucket}/agent-commons/*
                  - Bucket: !If [IsProduction, !Ref SourceBucket, !Ref SharedSourceBucketName]
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:GetDownloadUrlForLayer
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource: !Sub arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${SharedEcrRepositoryName}
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt TaskExecutionRole.Arn
                  - !GetAtt ApiTaskRole.Arn
                  - !GetAtt InfrastructureRole.Arn

  ApiBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !If [IsProduction, agent-commons-api-production, !Sub "agent-commons-api-${Environment}"]
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Source:
        Type: S3
        Location: !Sub
          - ${Bucket}/agent-commons/source.zip
          - Bucket: !If [IsProduction, !Ref SourceBucket, !Ref SharedSourceBucketName]
        BuildSpec: buildspec.aws.yml
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_LARGE
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: MAX_TASKS
            Value: !If [IsProduction, "4", "1"]
          - Name: ECR_REPOSITORY
            Value: !Ref SharedEcrRepositoryName
          - Name: TASK_EXECUTION_ROLE_ARN
            Value: !GetAtt TaskExecutionRole.Arn
          - Name: TASK_ROLE_ARN
            Value: !GetAtt ApiTaskRole.Arn
          - Name: INFRASTRUCTURE_ROLE_ARN
            Value: !GetAtt InfrastructureRole.Arn
          - Name: RUNTIME_SECRET_ARN
            Value: !Ref ApiRuntimeSecret
          - Name: AGENT_FILES_S3_BUCKET
            Value: !Ref AgentFilesBucket
          - Name: AGENT_FILES_S3_REGION
            Value: !Ref AWS::Region
          - Name: AGENT_FILES_S3_PREFIX
            Value: agent-commons-files
      TimeoutInMinutes: 60

Outputs:
  AwsRegion:
    Value: !Ref AWS::Region
  EcrRepository:
    Value: !Ref SharedEcrRepositoryName
  GitHubDeployRoleArn:
    Value: !GetAtt GitHubDeployRole.Arn
  TaskExecutionRoleArn:
    Value: !GetAtt TaskExecutionRole.Arn
  TaskRoleArn:
    Value: !GetAtt ApiTaskRole.Arn
  InfrastructureRoleArn:
    Value: !GetAtt InfrastructureRole.Arn
  RuntimeSecretArn:
    Value: !Ref ApiRuntimeSecret
  SourceBucketName:
    Value: !If [IsProduction, !Ref SourceBucket, !Ref SharedSourceBucketName]
  AgentFilesBucketName:
    Value: !Ref AgentFilesBucket
  CodeBuildProjectName:
    Value: !Ref ApiBuildProject
