AWSTemplateFormatVersion: "2010-09-09"
Description: Bootstrap resources for Commons Identity and the unified Commons API gateway.

# Deploy once per environment. Shared ECR repos are created by the production
# stack only; staging references them by name. Secrets, IAM roles, and the
# CodeBuild project are per-environment. Production physical names are unchanged.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
  SourceBucketName:
    Type: String
    Default: agent-commons-cicd-286273777416-eu-west-1
  IdentityEcrRepositoryName:
    Type: String
    Default: agent-commons/identity
  GatewayEcrRepositoryName:
    Type: String
    Default: agent-commons/api-gateway
  # Per-environment values threaded into the CodeBuild project. The internal
  # URLs are the ECS service endpoints for the target environment (set by the
  # operator once the api/compute services for that environment exist).
  IdentityIssuerUrl:
    Type: String
    Default: "https://auth.agentcommons.io/api/auth"
  AgentCommonsInternalUrl:
    Type: String
    Default: "https://ag-7e8bac7021504d988073ef19cc0ea6ad.ecs.eu-west-1.on.aws"
  CommonOsInternalUrl:
    Type: String
    Default: "https://co-34acbf16a9a0464c8be79137d4f7bbd6.ecs.eu-west-1.on.aws"

Conditions:
  IsProduction: !Equals [!Ref Environment, production]

Resources:
  IdentityRepository:
    Type: AWS::ECR::Repository
    Condition: IsProduction
    Properties:
      RepositoryName: agent-commons/identity
      ImageScanningConfiguration: { ScanOnPush: true }
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep 30 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":30},"action":{"type":"expire"}}]}

  GatewayRepository:
    Type: AWS::ECR::Repository
    Condition: IsProduction
    Properties:
      RepositoryName: agent-commons/api-gateway
      ImageScanningConfiguration: { ScanOnPush: true }
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep 30 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":30},"action":{"type":"expire"}}]}

  IdentityRuntimeSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub agent-commons/identity/${Environment}
      Description: !Sub Commons Identity ${Environment} runtime configuration.
      SecretString: "{}"

  GatewayRuntimeSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub agent-commons/api-gateway/${Environment}
      Description: !Sub Commons API gateway ${Environment} runtime configuration.
      SecretString: "{}"

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !If [IsProduction, commons-platform-task-execution, !Sub "commons-platform-${Environment}-task-execution"]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadCommonsPlatformSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref IdentityRuntimeSecret
                  - !Ref GatewayRuntimeSecret

  InfrastructureRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !If [IsProduction, commons-platform-ecs-infrastructure, !Sub "commons-platform-${Environment}-ecs-infra"]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSInfrastructureRoleforExpressGatewayServices

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !If [IsProduction, commons-platform-codebuild, !Sub "commons-platform-${Environment}-codebuild"]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: codebuild.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BuildAndDeployCommonsPlatform
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - ecr:GetAuthorizationToken
                  - cloudformation:DescribeStacks
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:PutMetricAlarm
                  - ecs:CreateCluster
                  - ecs:RegisterTaskDefinition
                  - ecs:CreateExpressGatewayService
                  - ecs:UpdateExpressGatewayService
                  - ecs:DeleteExpressGatewayService
                  - ecs:DescribeExpressGatewayService
                  - ecs:DescribeClusters
                  - ecs:DescribeServices
                  - ecs:DescribeServiceRevisions
                  - ecs:ListServiceDeployments
                  - ecs:DescribeServiceDeployments
                  - ecs:TagResource
                  - ecs:UntagResource
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub arn:aws:s3:::${SourceBucketName}/commons-platform/*
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:GetDownloadUrlForLayer
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource:
                  - !Sub arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${IdentityEcrRepositoryName}
                  - !Sub arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${GatewayEcrRepositoryName}
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt TaskExecutionRole.Arn
                  - !GetAtt InfrastructureRole.Arn

  BuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !If [IsProduction, commons-platform-production, !Sub "commons-platform-${Environment}"]
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Source:
        Type: S3
        Location: !Sub ${SourceBucketName}/commons-platform/source.zip
        BuildSpec: buildspec.api-platform.yml
      Artifacts: { Type: NO_ARTIFACTS }
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_LARGE
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: IDENTITY_ECR_REPOSITORY
            Value: !Ref IdentityEcrRepositoryName
          - Name: GATEWAY_ECR_REPOSITORY
            Value: !Ref GatewayEcrRepositoryName
          - Name: IDENTITY_ISSUER_URL
            Value: !Ref IdentityIssuerUrl
          - Name: AGENT_COMMONS_INTERNAL_URL
            Value: !Ref AgentCommonsInternalUrl
          - Name: COMMON_OS_INTERNAL_URL
            Value: !Ref CommonOsInternalUrl
          - Name: TASK_EXECUTION_ROLE_ARN
            Value: !GetAtt TaskExecutionRole.Arn
          - Name: INFRASTRUCTURE_ROLE_ARN
            Value: !GetAtt InfrastructureRole.Arn
          - Name: IDENTITY_RUNTIME_SECRET_ARN
            Value: !Ref IdentityRuntimeSecret
          - Name: GATEWAY_RUNTIME_SECRET_ARN
            Value: !Ref GatewayRuntimeSecret
      TimeoutInMinutes: 60

Outputs:
  IdentityRuntimeSecretArn: { Value: !Ref IdentityRuntimeSecret }
  GatewayRuntimeSecretArn: { Value: !Ref GatewayRuntimeSecret }
  TaskExecutionRoleArn: { Value: !GetAtt TaskExecutionRole.Arn }
  InfrastructureRoleArn: { Value: !GetAtt InfrastructureRole.Arn }
  CodeBuildProjectName: { Value: !Ref BuildProject }
