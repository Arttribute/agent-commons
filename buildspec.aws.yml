version: 0.2

env:
  shell: bash

phases:
  pre_build:
    commands:
      - set -euo pipefail
      # ENVIRONMENT comes from the CodeBuild project (production | staging).
      # Production keeps the original unsuffixed stack name for continuity.
      - ENVIRONMENT="${ENVIRONMENT:-production}"
      - SERVICE_NAME="agent-commons-api-${ENVIRONMENT}"
      - if [ "$ENVIRONMENT" = "production" ]; then STACK_NAME="agent-commons-api-service"; else STACK_NAME="agent-commons-api-service-${ENVIRONMENT}"; fi
      - MAX_TASKS="${MAX_TASKS:-4}"
      - IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-manual}-${CODEBUILD_BUILD_NUMBER}"
      - IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}"
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
  build:
    commands:
      - docker build --platform linux/amd64 -f apps/commons-api/Dockerfile -t "$IMAGE_URI" .
      - docker push "$IMAGE_URI"
  post_build:
    commands:
      # Apply ordered, ledger-backed migrations before starting code that may
      # depend on them. Break-glass deploys can opt out with RUN_MIGRATIONS=false.
      - |
        if [ "${RUN_MIGRATIONS:-true}" = "true" ]; then
          echo "Running database migrations..."
          SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id "$RUNTIME_SECRET_ARN" --query SecretString --output text --region "$AWS_REGION")
          docker run --rm \
            -e POSTGRES_HOST="$(echo "$SECRET_JSON" | jq -r .POSTGRES_HOST)" \
            -e POSTGRES_PORT="$(echo "$SECRET_JSON" | jq -r .POSTGRES_PORT)" \
            -e POSTGRES_DATABASE="$(echo "$SECRET_JSON" | jq -r .POSTGRES_DATABASE)" \
            -e POSTGRES_USER="$(echo "$SECRET_JSON" | jq -r .POSTGRES_USER)" \
            -e POSTGRES_PASSWORD="$(echo "$SECRET_JSON" | jq -r .POSTGRES_PASSWORD)" \
            -e POSTGRES_SSL="$(echo "$SECRET_JSON" | jq -r '.POSTGRES_SSL // "disable"')" \
            "$IMAGE_URI" node scripts/migrate.mjs
        fi
      - trap 'kill "${ALARM_GUARD_PID:-}" 2>/dev/null || true; wait "${ALARM_GUARD_PID:-}" 2>/dev/null || true; infra/aws/set-express-alarm-threshold.sh "$SERVICE_NAME" 1 || true' EXIT
      # Non-fatal: the RollbackAlarm does not exist until the service is first
      # created, so this is a no-op on the very first deploy of an environment.
      - infra/aws/set-express-alarm-threshold.sh "$SERVICE_NAME" 100 || true
      - (while sleep 20; do infra/aws/set-express-alarm-threshold.sh "$SERVICE_NAME" 100 || true; done) & ALARM_GUARD_PID=$!
      - >-
        aws cloudformation deploy
        --stack-name "$STACK_NAME"
        --template-file infra/aws/ecs-express-service.yml
        --capabilities CAPABILITY_NAMED_IAM
        --parameter-overrides
        Environment="$ENVIRONMENT"
        MaxTasks="$MAX_TASKS"
        ImageUri="$IMAGE_URI"
        ExecutionRoleArn="$TASK_EXECUTION_ROLE_ARN"
        TaskRoleArn="$TASK_ROLE_ARN"
        InfrastructureRoleArn="$INFRASTRUCTURE_ROLE_ARN"
        RuntimeSecretArn="$RUNTIME_SECRET_ARN"
        AgentFilesS3Bucket="$AGENT_FILES_S3_BUCKET"
        AgentFilesS3Region="$AGENT_FILES_S3_REGION"
        AgentFilesS3Prefix="$AGENT_FILES_S3_PREFIX"
        --region "$AWS_REGION"
      - ENDPOINT=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query 'Stacks[0].Outputs[?OutputKey==`Endpoint`].OutputValue' --output text --region "$AWS_REGION")
      - ENDPOINT="https://${ENDPOINT#https://}"
      - curl --fail --show-error --silent --retry 18 --retry-delay 10 --retry-all-errors "${ENDPOINT%/}/health" | jq -e '.status == "ok"'
      - kill "$ALARM_GUARD_PID" 2>/dev/null || true
      - wait "$ALARM_GUARD_PID" 2>/dev/null || true
      - infra/aws/set-express-alarm-threshold.sh "$SERVICE_NAME" 1 || true
      - trap - EXIT
      - printf '{"endpoint":"%s","image":"%s","environment":"%s"}\n' "$ENDPOINT" "$IMAGE_URI" "$ENVIRONMENT" > deployment.json

artifacts:
  files:
    - deployment.json
