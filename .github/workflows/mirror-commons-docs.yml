name: Mirror commons-docs

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Generate standalone lockfile for commons-docs
        working-directory: apps/commons-docs
        run: pnpm install --no-frozen-lockfile

      - name: Mirror to Arttribute/commons-docs
        env:
          COMMONS_DOCS_MIRROR_TOKEN: ${{ secrets.COMMONS_DOCS_MIRROR_TOKEN }}
        run: |
          git clone https://x-access-token:${COMMONS_DOCS_MIRROR_TOKEN}@github.com/Arttribute/commons-docs.git /tmp/commons-docs

          # Clear destination contents (preserve .git directory)
          find /tmp/commons-docs -mindepth 1 -not -path '/tmp/commons-docs/.git*' -delete

          # Copy the commons-docs subdirectory into the destination
          cp -r apps/commons-docs/. /tmp/commons-docs/

          # Copy the freshly generated standalone lockfile
          cp apps/commons-docs/pnpm-lock.yaml /tmp/commons-docs/pnpm-lock.yaml

          cd /tmp/commons-docs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          # Only commit and push if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to mirror."
          else
            git commit -m "sync: mirror from agent-commons monorepo

            Source: ${{ github.repository }}@${{ github.sha }}"
            git push origin main
          fi
